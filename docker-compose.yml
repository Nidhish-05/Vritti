services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16

    container_name: vritti-timescaledb

    environment:
      POSTGRES_DB: vritti_db
      POSTGRES_USER: vritti
      POSTGRES_PASSWORD: vritti_password

    ports:
      - "5432:5432"

    volumes:
      - timescaledb_data:/var/lib/postgresql/data

volumes:
  timescaledb_data: