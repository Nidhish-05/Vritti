name: Vritti CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8 black

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Run black (check mode)
        run: black --check src/ tests/

  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    # TODO (Phase 7): Uncomment TimescaleDB service when tests need a real DB
    # services:
    #   db:
    #     image: timescale/timescaledb:latest-pg16
    #     env:
    #       POSTGRES_USER: vritti
    #       POSTGRES_PASSWORD: vritti_password
    #       POSTGRES_DB: vritti_db
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

